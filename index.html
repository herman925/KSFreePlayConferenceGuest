<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由遊戲綜合教學法課程總結分享會 — 參加者</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .site-title {
            font-weight: 600;
            color: #2b3990;
            font-size: 1rem;
        }
</style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-wrapper"></div>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>分享會主頁</h1>
            <p class="subtitle">賽馬會童亮計劃（第二期）</p>
            <p class="subtitle">自由遊戲綜合教學法課程總結分享會</p>
            <div class="date-info">
                <i class="fas fa-calendar-alt"></i>
                2026年3月14日（星期六）
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card" data-section="overview">
                <i class="fas fa-info-circle"></i>
                <h2>簡介</h2>
                <p>重點目標及分享會資訊</p>
            </div>
            <div class="card" data-section="schedule">
                <i class="fas fa-calendar-alt"></i>
                <h2>時間表</h2>
                <p>完整流程及時間安排</p>
            </div>
            <div class="card" data-section="activity-details">
                <i class="fas fa-list-alt"></i>
                <h2>活動詳情</h2>
                <p>活動一及活動二的指引</p>
            </div>
            <div class="card surveys-card" data-section="surveys">
                <i class="fas fa-poll"></i>
                <h2>問卷調查及Google Classroom</h2>
                <p>前測、後測問卷及Google Classroom</p>
            </div>
        </div>

    </main>

    <footer>
        <p>賽馬會童亮計劃自由遊戲綜合教學法課程總結分享會 — 2026年3月14日</p>
    </footer>

    <script>
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const routes = {
                    'overview': 'pages/overview.html',
                    'schedule': 'pages/schedule.html',
                    'activity-details': 'pages/activity_details.html',
                    'surveys': 'pages/surveys.html'
                };
                const dest = routes[this.dataset.section];
                if (dest) window.location.href = dest;
            });
        });
    </script>
</body>
</html>
